- hosts: workstations
  become: true
  tasks:

  - name: install unzip
    package:
      name: unzip

  - name: install terraform
    unarchive:
      src: https://releases.hashicorp.com/terraform/0.12.28/terraform_0.12.28_linux_amd64.zip
      dest: /usr/local/bin
      remote_src: yes
      mode: 0755
      owner: root
      group: root


- hosts: web_servers
  become: true
  tasks:

  - name: Update distro repo index and install apache and php for web servers
    tags: apache,apache2,ubuntu,centos
    package:
      name:
        - "{{ apache_package }}"
        - "{{ php_package }}"
      state: latest

  - name: start httpd
    tags: apache,httpd,
    service:
      name: "{{ apache_package }}"
      state: started
      enabled: yes
    register: apache_service


  - name: restart httpd
    tags: apache,httpd
    service:
      name: "{{ apache_package }}"
      state: restarted
    when: apache_service.changed

  - name: change e-mail address for admin (CentOS)
    tags: apache,centos,httpd
    lineinfile:
      path: /etc/httpd/conf/httpd.conf
      regexp: '^ServerAdmin'
      line: ServerAdmin somebody@somewhere.net
    when: ansible_distribution == "CentOS"
    notify: restart_apache

  - name: Change e-mail address for admin (Ubuntu)
    tags: apache,ubuntu,httpd
    lineinfile:
      path: /etc/apache2/apache2.conf
      regexp: '^ServerAdmin'
      line: ServerAdmin somebody@somewhere.com
    when: ansible_distribution == "Ubuntu"
    notify: restart_apache

  - name: copy default html file for site
    tags: apache,apache2,httpd
    copy:
      src: default_site.html
      dest: /var/www/html/index.html
      owner: root
      group: root
      mode: 0644

- hosts: db_servers
  become: true
  tasks:
  
  - name: install mariadb package
    tags: ubuntu,db,mariadb
    package:
      name: mariadb-server
      state: latest
  
- hosts: file_servers
  become: true
  tasks:

  - name: install samba package
    tags: samba
    package:
      name: samba
      state: latest
